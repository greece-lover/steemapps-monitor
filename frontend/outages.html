<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Outages · Steem API Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<header class="site">
  <div class="site-inner">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div class="brand-text">
        <div class="brand-title">Outage log</div>
        <div class="brand-tagline">Chronological record of every detected outage. Filter, inspect, export.</div>
      </div>
    </div>
    <div class="header-right">
      <nav class="nav-links">
        <a href="index.html">Overview</a>
        <a href="stats.html">Stats</a>
        <a href="regions.html">Regions</a>
        <a href="outages.html" class="active">Outages</a>
      </nav>
    </div>
  </div>
</header>

<main class="container">

  <section class="stats-section">
    <div class="section-head">
      <h2 class="section-title">Filters</h2>
      <span class="section-sub" id="outages-count">loading…</span>
    </div>

    <div class="controls" id="outage-controls">
      <div class="ctrl">
        <label for="f-out-range">Range</label>
        <select id="f-out-range">
          <option value="24h">24h</option>
          <option value="7d">7d</option>
          <option value="30d" selected>30d</option>
          <option value="90d">90d</option>
        </select>
      </div>

      <div class="ctrl">
        <label for="f-out-node">Node</label>
        <select id="f-out-node">
          <option value="">all</option>
        </select>
      </div>

      <div class="ctrl">
        <label for="f-out-sev">Severity</label>
        <select id="f-out-sev">
          <option value="">all</option>
          <option value="real">real (≥120 s)</option>
          <option value="short">short (&lt;120 s)</option>
        </select>
      </div>

      <div class="ctrl">
        <label for="f-out-min">Min duration</label>
        <input type="range" id="f-out-min" min="0" max="1800" value="0" step="30">
        <span id="f-out-min-val" class="score-val">0s</span>
      </div>

      <button type="button" id="f-out-reset" class="reset-btn">reset</button>

      <div class="ctrl ctrl-export">
        <span class="ctrl-label">Export</span>
        <a id="export-csv" class="share-btn" href="#" download>⤓ CSV</a>
        <a id="export-json" class="share-btn" href="#" download>⤓ JSON</a>
      </div>
    </div>
  </section>

  <section class="stats-section">
    <div class="table-wrap">
      <table class="data-table" id="outages-table">
        <thead>
          <tr>
            <th>Node</th>
            <th>Start</th>
            <th>End</th>
            <th>Duration</th>
            <th>Severity</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="6" class="loading">Loading…</td></tr></tbody>
      </table>
    </div>
  </section>

</main>

<script src="js/common.js" defer></script>
<script src="js/outages.js" defer></script>
</body>
</html>
