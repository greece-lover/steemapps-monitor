<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Node detail · Steem API Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<header class="site">
  <div class="site-inner">
    <div class="brand">
      <a href="index.html" class="back-link" id="back-link">← Overview</a>
      <div class="brand-text">
        <div class="brand-title" id="node-title">Loading…</div>
        <div class="brand-tagline">
          <span id="node-region">—</span>
          <span class="sep">·</span>
          <span class="status-pill" id="node-status-pill" data-status="unknown">
            <span class="dot"></span><span id="node-status-label">UNKNOWN</span>
          </span>
          <span class="sep">·</span>
          <span id="node-score">score —</span>
        </div>
      </div>
    </div>

    <div class="header-right">
      <nav class="nav-links">
        <a href="index.html" id="nav-overview-link">Overview</a>
        <a href="stats.html" id="nav-stats-link">Stats</a>
      </nav>
      <div class="meta">
        <div class="meta-row meta-controls">
          <div class="range-toggle" id="range-toggle" role="tablist" aria-label="time range">
            <button type="button" data-range="24h" class="active">24h</button>
            <button type="button" data-range="7d">7d</button>
            <button type="button" data-range="30d">30d</button>
          </div>
          <button type="button" id="share-btn" class="share-btn" title="copy page URL">🔗 Copy link</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="container">

  <!-- Latency + Compare -->
  <section class="detail-section">
    <div class="section-head">
      <h2 class="section-title">Latency</h2>
      <div class="compare-controls">
        <label class="ctrl-label" for="compare-toggle">Compare with:</label>
        <div class="compare-wrap">
          <button type="button" id="compare-toggle" class="compare-toggle" aria-expanded="false">+ add node</button>
          <div class="compare-picker" id="compare-picker" hidden></div>
        </div>
      </div>
    </div>
    <div class="chart-wrap tall"><canvas id="latency-chart" aria-label="Latency over time"></canvas></div>
    <div id="latency-legend" class="compare-legend"></div>
  </section>

  <!-- Percentiles -->
  <section class="detail-section">
    <div class="section-head">
      <h2 class="section-title">Latency percentiles</h2>
      <span class="section-sub" id="percentile-range">(loading…)</span>
    </div>
    <div class="table-wrap">
      <table class="data-table" id="percentile-table">
        <thead>
          <tr>
            <th>Node</th><th>Min</th><th>Avg</th><th>P50</th><th>P95</th><th>P99</th><th>Max</th><th>Samples</th><th>Uptime</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- Uptime calendar -->
  <section class="detail-section">
    <div class="section-head">
      <h2 class="section-title">Uptime calendar</h2>
      <span class="section-sub">last 30 days</span>
    </div>
    <div id="uptime-calendar" class="uptime-calendar" aria-label="daily uptime calendar"></div>
    <div class="calendar-legend">
      <span class="ck green"></span> ≥99%
      <span class="ck yellow"></span> 95–99%
      <span class="ck red"></span> &lt;95%
      <span class="ck grey"></span> no data
    </div>
  </section>

  <!-- Outages -->
  <section class="detail-section">
    <div class="section-head">
      <h2 class="section-title">Outages</h2>
      <span class="section-sub" id="outage-count">(loading…)</span>
    </div>
    <div class="table-wrap">
      <table class="data-table" id="outages-table">
        <thead>
          <tr><th>Start</th><th>End</th><th>Duration</th><th>Severity</th><th>Error</th></tr>
        </thead>
        <tbody><tr><td colspan="5" class="loading">Loading…</td></tr></tbody>
      </table>
    </div>
  </section>

  <!-- Block lag -->
  <section class="detail-section">
    <div class="section-head">
      <h2 class="section-title">Block lag</h2>
      <span class="section-sub">blocks behind the chain tip</span>
    </div>
    <div class="chart-wrap"><canvas id="block-lag-chart" aria-label="Block lag over time"></canvas></div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js" defer></script>
<script src="js/common.js" defer></script>
<script src="js/node.js" defer></script>
</body>
</html>
