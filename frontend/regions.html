<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Regions · Steem API Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<header class="site">
  <div class="site-inner">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div class="brand-text">
        <div class="brand-title">Regions</div>
        <div class="brand-tagline">Geographic distribution of the monitored node fleet.</div>
      </div>
    </div>
    <div class="header-right">
      <div class="toolbar">
        <select class="toolbar-select" data-refresh-select aria-label="auto refresh"></select>
        <button type="button" class="toolbar-btn" data-theme-toggle>☀ Light</button>
      </div>
      <nav class="nav-links">
        <a href="index.html">Overview</a>
        <a href="stats.html">Stats</a>
        <a href="regions.html" class="active">Regions</a>
        <a href="outages.html">Outages</a>
      </nav>
    </div>
  </div>
</header>

<main class="container">

  <section class="stats-section">
    <div class="section-head">
      <h2 class="section-title">Map</h2>
      <span class="section-sub">Pin colour = current aggregated status of the region</span>
    </div>
    <div id="region-map" class="region-map" aria-label="world map with node locations"></div>
    <div class="calendar-legend" style="margin-top:12px;">
      <span class="ck green"></span> all ok
      <span class="ck yellow"></span> degraded
      <span class="ck red"></span> one or more down
      <span class="ck grey"></span> no data
    </div>
  </section>

  <section class="stats-section">
    <div class="section-head">
      <h2 class="section-title">Regional averages</h2>
      <span class="section-sub">24 h window</span>
    </div>
    <div class="table-wrap">
      <table class="data-table" id="regions-table">
        <thead>
          <tr>
            <th>Region</th>
            <th>Nodes</th>
            <th>Avg latency</th>
            <th>Avg uptime</th>
            <th>Status</th>
            <th>Coordinates</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="6" class="loading">Loading…</td></tr></tbody>
      </table>
    </div>
  </section>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
        defer></script>
<script src="js/common.js" defer></script>
<script src="js/regions.js" defer></script>
</body>
</html>
